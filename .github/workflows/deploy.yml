name: ARC Instagram Fleet Commander

on:
  workflow_dispatch:
    inputs:
      video_filename:
        description: 'Exact video filename (must be uploaded to repo)'
        required: true
      caption:
        description: 'Text caption with ManyChat trigger'
        required: true
        default: 'The Motherboard is live. Comment ARC to enter.'

jobs:
  deploy-reels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Infrastructure
        run: |
          pip install instagrapi moviepy==1.0.3

      - name: Execute Mass Upload
        env:
          IG_ACCOUNTS: ${{ secrets.IG_ACCOUNTS }}
          VIDEO_FILE: ${{ github.event.inputs.video_filename }}
          CAPTION: ${{ github.event.inputs.caption }}
        run: |
          python run_mass_upload.py
          
